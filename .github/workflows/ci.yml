name: CI

on:
  push:
    branches: [master, dev-hotschmoe]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
          persist-credentials: false

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Run demos
        run: zig build demo

      - name: Run bounded fuzz smoke
        env:
          FUZZ_SMOKE_LIMIT: "1K"
          FUZZ_SMOKE_WALL_TIMEOUT: "90s"
          FUZZ_SMOKE_COVERAGE_RETRIES: "1"
          ZIG_FUZZ_ALLOW_COVERAGE_FALLBACK: "1"
        run: /bin/bash scripts/fuzz-smoke.sh

      - name: Cross-compile check (aarch64-freestanding)
        run: zig build -Dtarget=aarch64-freestanding-none
