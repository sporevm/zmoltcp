[tools]
zig = "0.16.0"

[tasks.test]
description = "Run unit, conformance, regression, and fuzz smoke tests"
run = "zig build test --summary all"

[tasks.demo]
description = "Run integration demos"
run = "zig build demo --summary all"

[tasks.fuzz]
description = "Run bounded P0 native fuzz smoke"
run = "/bin/bash scripts/fuzz-smoke.sh"

[tasks.fuzz-p1]
description = "Run bounded P1 native fuzz smoke"
run = "FUZZ_SMOKE_TARGETS='fuzz-protocol-parsers fuzz-rpl-state' /bin/bash scripts/fuzz-smoke.sh"

[tasks.fuzz-p2]
description = "Run bounded P2 native fuzz smoke"
run = "FUZZ_SMOKE_TARGETS='fuzz-storage-streams fuzz-socket-state fuzz-phy-middleware' /bin/bash scripts/fuzz-smoke.sh"

[tasks.fuzz-all]
description = "Run bounded native fuzz smoke across all targets"
run = "FUZZ_SMOKE_TARGETS='fuzz-dns fuzz-tcp-header fuzz-ip-header fuzz-ipv6-extension fuzz-stack-ingress fuzz-reassembly fuzz-protocol-parsers fuzz-rpl-state fuzz-storage-streams fuzz-socket-state fuzz-phy-middleware' /bin/bash scripts/fuzz-smoke.sh"

[tasks.fuzz-long]
description = "Run a longer wall-clock-bounded native fuzz campaign"
run = "/bin/bash scripts/fuzz-long.sh"

[tasks.cross]
description = "Cross-compile for aarch64 freestanding"
run = "zig build -Dtarget=aarch64-freestanding-none --summary all"

[tasks.fmt]
description = "Format Zig sources and package manifest"
run = "zig fmt build.zig build.zig.zon src examples"

[tasks.check]
description = "Run the full local validation suite"
run = [
    "zig build test --summary all",
    "zig build demo --summary all",
    "mise run fuzz",
    "zig build -Dtarget=aarch64-freestanding-none --summary all",
]

[tasks.ci]
description = "Alias for check"
run = "mise run check"
